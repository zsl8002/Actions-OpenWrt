name: Build OpenWrt Firmware
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 6'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget curl

      - name: Clone OpenWrt Source
        run: |
          git clone https://github.com/immortalwrt/immortalwrt.git openwrt
          cd openwrt

      - name: Execute DIY Part 1
        run: |
          cd openwrt
          bash ../diy-part1.sh

      - name: Update & Install Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Execute DIY Part 2
        run: |
          cd openwrt
          bash ../diy-part2.sh

      - name: Load Configuration
        run: |
          cd openwrt
          cp ../.config .config
          make defconfig

      - name: Download Packages
        run: |
          cd openwrt
          make download -j8

      - name: Compile Firmware
        run: |
          cd openwrt
          make -j$(nproc)

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: openwrt/bin/targets/
