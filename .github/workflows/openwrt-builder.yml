name: Build OpenWrt

# 手动触发 & 每周自动
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 6' # 每周六 03:00 自动编译

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

    # 1. 检出仓库
    - name: Checkout
      uses: actions/checkout@v4

    # 2. 安装编译依赖
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3 rsync unzip zlib1g-dev file wget curl

    # 3. 克隆 OpenWrt 源码
    - name: Clone OpenWrt
      run: |
        git clone https://github.com/openwrt/openwrt
        cd openwrt
        git checkout openwrt-24.10

    # 4. 替换 feeds / 软件源
    - name: DIY Feeds
      run: |
        cd openwrt
        bash ../scripts/diy-part1.sh

    # 5. 更新并安装 feeds
    - name: Update Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    # 6. 拉取插件
    - name: DIY Plugins
      run: |
        cd openwrt
        bash ../scripts/diy-part2.sh

    # 7. 加载固件配置
    - name: Load Config
      run: |
        cp ../configs/openwrt.config openwrt/.config
        cd openwrt
        make defconfig

    # 8. 下载依赖包
    - name: Download Packages
      run: |
        cd openwrt
        make download -j8

    # 9. 编译固件
    - name: Compile Firmware
      run: |
        cd openwrt
        make -j$(nproc)

    # 10. 上传固件到 GitHub
    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-firmware
        path: openwrt/bin/targets
