name: Build OpenWrt Firmware

# 手动触发 & 每周自动编译
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 6' # 每周六 3:00 自动编译

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget curl

      - name: Clone OpenWrt Source
        run: |
          # 克隆主源码（这里使用 ImmortalWrt 源码，稳定性高，带新版LuCI）
          git clone https://github.com/immortalwrt/immortalwrt.git openwrt
          cd openwrt
          # 可指定版本，例如: git checkout origin/openwrt-23.05 -b local

      - name: Execute DIY Part 1 (Feeds Config)
        run: |
          cd openwrt
          # 执行上级目录的脚本，修改软件源
          bash ../diy-part1.sh

      - name: Update & Install Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Execute DIY Part 2 (Plugin Pull)
        run: |
          cd openwrt
          # 执行上级目录的脚本，拉取插件
          bash ../diy-part2.sh

      - name: Load Configuration
        run: |
          cd openwrt
          # 复制根目录的 .config 文件进来
          cp ../.config .config
          make defconfig

      - name: Download Packages
        run: |
          cd openwrt
          make download -j8

      - name: Compile Firmware
        run: |
          cd openwrt
          make -j$(nproc)

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: openwrt/bin/targets/
